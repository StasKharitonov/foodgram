server {
  listen 80;
  server_name acidfoodgram.ddns.net;
  server_tokens off;
  index index.html;

  client_max_body_size 20M;

  location /api/docs/ {
    alias /usr/share/nginx/html/api/docs/;
    index redoc.html;
  }
  location /api/ {
    client_max_body_size 20M;
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/api/;
  }
  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/admin/;
  }
  location /media/ {
      alias /media/;
      client_max_body_size 20M;
  }
  location /s/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/s/;
  }
  location /static/ {
    alias /staticfiles/static/;
  }
  location / {
    alias /staticfiles/;
    try_files $uri $uri/ /index.html;
    index index.html;
  }
}